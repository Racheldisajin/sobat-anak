<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/logo_game.jpeg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="description" content="Memory Fun Cards - Game memory kartu seru untuk anak-anak!" />
    <meta name="theme-color" content="#FFF5E6" />

    <!-- Prevent iOS zoom on double-tap -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />

    <title>Memory Fun Cards</title>

    <!-- Open Graph -->
    <meta property="og:title" content="Memory Fun Cards" />
    <meta property="og:description" content="Game memory kartu seru untuk anak-anak!" />
    <meta property="og:type" content="website" />

    <style>
      /* Critical CSS for faster load */
      body {
        background-color: #FFF5E6;
        font-family: 'Fredoka', 'Comic Sans MS', cursive, sans-serif;
        margin: 0;
        padding: 0;
        overflow-x: hidden;
      }

      #root {
        min-height: 100vh;
        min-height: 100dvh;
      }

      /* Loading animation */
      .loading-screen {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: #FFF5E6;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 9999;
      }

      .loading-card {
        width: 80px;
        height: 100px;
        background: linear-gradient(135deg, #fbbf24 0%, #f59e0b 100%);
        border-radius: 12px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 40px;
        animation: bounce 1s ease-in-out infinite;
      }

      @keyframes bounce {
        0%, 100% { transform: translateY(0) rotate(0deg); }
        50% { transform: translateY(-20px) rotate(5deg); }
      }

      .loading-text {
        margin-top: 20px;
        font-size: 24px;
        color: #666;
      }
    </style>
  </head>
  <body>
    <div id="root">
      <!-- Loading screen shown while JS loads -->
      <div class="loading-screen">
        <div class="loading-card">🃏</div>
        <div class="loading-text">Memuat...</div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
